<header class="site-header">
  <div class="sh-inner">
    <a class="term-brand" href="{{ '/' | relative_url }}" aria-label="Home">
      <span class="tb-dots"><span class="win-dot r"></span><span class="win-dot y"></span><span class="win-dot g"></span></span>
      <span class="tb-user">{{ site.brand }}</span><span class="tb-sep">:</span><span class="tb-cwd">{{ site.cwd }}</span><span class="tb-prompt">$</span>
    </a>
    <nav class="term-nav" aria-label="Primary">
      {% for n in site.nav %}
      {% assign scheme = n.url | slice: 0, 4 %}
      <a href="{{ n.url }}"{% if scheme == 'http' %} target="_blank" rel="noopener"{% endif %}>{{ n.label }}</a>
      {% endfor %}
    </nav>
    <div class="theme-toggle" role="group" aria-label="Appearance">
      <button type="button" data-mode="system" title="System" aria-label="System"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg></button>
      <button type="button" data-mode="light" title="Light" aria-label="Light"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></button>
      <button type="button" data-mode="dark" title="Dark" aria-label="Dark"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    </div>
  </div>
</header>
