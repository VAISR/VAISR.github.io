<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title and page.title != "Home" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.description }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/VAISR-logo.svg' | relative_url }}">

<meta property="og:title" content="{% if page.title and page.title != 'Home' %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">
{% if page.og_image %}<meta property="og:image" content="{{ page.og_image | absolute_url }}">{% endif %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ '/assets/css/tokens.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/nubo-design.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/terminal.css' | relative_url }}">
{% if include.project %}<link rel="stylesheet" href="{{ '/assets/css/project.css' | relative_url }}">{% endif %}

<script>
  /* no-flash: apply theme + accent before first paint (mirrors orientonubo). */
  (function () {
    var mode = localStorage.getItem("nubo-theme") || "system";
    var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", mode === "system" ? (dark ? "dark" : "light") : mode);
    var a = localStorage.getItem("nubo-accent");
    if (a) {
      document.documentElement.style.setProperty("--p-accent", a);
      var m = a.replace("#", ""), r = parseInt(m.slice(0, 2), 16), g = parseInt(m.slice(2, 4), 16), b = parseInt(m.slice(4, 6), 16);
      document.documentElement.style.setProperty("--p-accent-ink", (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.62 ? "#1a1a1a" : "#ffffff");
    }
  })();
</script>
{% if include.mathjax %}
<script>
  window.MathJax = {
    tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] },
    svg: { fontCache: 'global' }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
{% endif %}
